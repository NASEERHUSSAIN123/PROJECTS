<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register - Traffic Telligence</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
      body { background-color: #f4f7f6; padding-top: 50px; padding-bottom: 50px;}
      .card { border-radius: 10px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
                <h3 class="text-center text-primary mb-3">Traffic Telligence</h3>
                <h5 class="text-center text-muted mb-4">Create an Account</h5>
                
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form action="/register" method="POST" onsubmit="return validateForm()">
                    <div class="row">
                        <div class="col-md-6 form-group">
                            <input type="text" class="form-control" id="fname" placeholder="First Name" name="fname" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <input type="text" class="form-control" id="lname" placeholder="Last Name" name="lname" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-control" id="email" placeholder="Email Address" name="email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" id="setPwd" placeholder="Set Password (Min 8 chars)" name="setPwd" required>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" id="confirmPwd" placeholder="Confirm Password" name="confirmPwd" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mb-3">Register Now</button>
                    
                    <div class="text-center">
                        <a href="{{ url_for('index') }}" class="text-decoration-none">Already have an account? Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function validateForm() {
    let pwd = document.getElementById("setPwd").value;
    let cpwd = document.getElementById("confirmPwd").value;
    if (pwd.length < 8) {
        alert("Password must be at least 8 characters long.");
        return false;
    }
    if (pwd !== cpwd) {
        alert("Passwords do not match.");
        return false;
    }
    return true;
}
</script>
</body>
</html>
