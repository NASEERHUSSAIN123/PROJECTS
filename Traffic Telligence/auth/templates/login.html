<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traffic Telligence</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border-radius: 10px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="card p-4">
    <h3 class="text-center text-primary mb-3">Traffic Telligence</h3>
    <h5 class="text-center text-muted mb-4">Secure Login</h5>
    
    <div id="alert-box" class="alert d-none"></div>

    <form id="otp-form">
        <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="button" class="btn btn-primary btn-block mb-3" onclick="sendOTP()">Send OTP</button>
    </form>

    <form id="verify-form" class="d-none">
        <hr>
        <div class="form-group">
            <input type="text" id="otp" class="form-control text-center" placeholder="Enter 6-digit OTP" required>
        </div>
        <button type="button" class="btn btn-success btn-block" onclick="verifyOTP()">Verify OTP & Login</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('register') }}" class="text-decoration-none">Don't have an account? Register Here</a>
    </div>
</div>

<script>
    function showAlert(msg, type) {
        const alertBox = document.getElementById('alert-box');
        alertBox.className = `alert alert-${type}`;
        alertBox.innerText = msg;
    }

    async function sendOTP() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) return showAlert("Please enter email and password.", "danger");

        showAlert("Sending OTP...", "info");
        const res = await fetch('/send-otp', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
            showAlert(data.message, "success");
            document.getElementById('verify-form').classList.remove('d-none');
            document.getElementById('otp-form').classList.add('d-none');
        } else {
            showAlert(data.message, "danger");
        }
    }

    async function verifyOTP() {
        const email = document.getElementById('email').value;
        const otp = document.getElementById('otp').value;
        if (!otp) return showAlert("Please enter the OTP.", "warning");

        const res = await fetch('/verify-otp', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, otp })
        });
        const data = await res.json();

        if (res.ok) {
            window.location.href = data.redirect;
        } else {
            showAlert(data.message, "danger");
        }
    }
</script>
</body>
</html>
